<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CancharaNet - Minuto a Minuto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/partido.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <header class="header">
    <div class="header-top">
      <div class="container">
        <div class="logo">
          <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
            <span class="logo-icon">🇦🇷</span>
            <span class="logo-text">Canchara<span class="logo-accent">Net</span></span>
          </a>
        </div>
        <div class="breadcrumb">
          <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
          <span> / </span>
          <span id="breadcrumb-liga">Liga Profesional</span>
          <span> / </span>
          <span id="breadcrumb-partido">Partido</span>
        </div>
        <div class="header-date">
          <i class="fas fa-calendar-alt"></i>
          <span id="fecha-actual"></span>
        </div>
      </div>
    </div>
  </header>

  <section class="partido-hero" id="partido-hero">
    <div class="container">

      <div class="partido-liga-info">
        <span id="hero-liga-emoji">🏆</span>
        <span id="hero-liga-nombre">Liga Profesional</span>
        <span class="separador">|</span>
        <span id="hero-estadio">Estadio</span>
      </div>

      <div class="marcador-hero">
        <div class="equipo-hero" id="equipo-local">
          <div class="equipo-hero-escudo" id="escudo-local">⚽</div>
          <div class="equipo-hero-nombre" id="nombre-local">Local</div>
        </div>
        <div class="marcador-hero-centro">
          <div class="marcador-hero-goles" id="marcador-goles">- : -</div>
          <div class="marcador-hero-estado" id="estado-partido">
            <span class="live-badge-hero">● EN VIVO</span>
            <span id="minuto-actual"></span>
          </div>
          <div class="marcador-hero-ht" id="medio-tiempo"></div>
        </div>
        <div class="equipo-hero" id="equipo-visitante">
          <div class="equipo-hero-escudo" id="escudo-visitante">⚽</div>
          <div class="equipo-hero-nombre" id="nombre-visitante">Visitante</div>
        </div>
      </div>

      <div class="progreso-partido">
        <span class="progreso-label">0'</span>
        <div class="progreso-barra">
          <div class="progreso-fill" id="progreso-fill" style="width:0%"></div>
        </div>
        <span class="progreso-label">90'</span>
      </div>

      <div class="partido-tabs">
        <button class="partido-tab active" data-tab="eventos">⚡ Eventos</button>
        <button class="partido-tab" data-tab="estadisticas">📊 Estadisticas</button>
        <button class="partido-tab" data-tab="alineaciones">👥 Alineaciones</button>
        <button class="partido-tab" data-tab="h2h">📋 Historial</button>
      </div>

    </div>
  </section>

  <main class="main-content">
    <div class="container">
      <div class="layout-grid">

        <div class="col-main">

          <div id="tab-eventos" class="tab-content active">
            <div class="section">
              <div class="section-header">
                <h2><i class="fas fa-bolt"></i> Minuto a Minuto</h2>
                <div class="live-controls">
                  <span class="actualizado">Act: <span id="hora-eventos"></span></span>
                  <span class="badge-vivo" id="badge-vivo-eventos">● EN VIVO</span>
                </div>
              </div>
              <div class="goles-resumen" id="goles-resumen"></div>
              <div class="timeline" id="timeline-eventos"></div>
            </div>
          </div>

          <div id="tab-estadisticas" class="tab-content">
            <div class="section">
              <div class="section-header">
                <h2><i class="fas fa-chart-bar"></i> Estadisticas</h2>
              </div>
              <div id="estadisticas-partido" class="estadisticas-grid"></div>
            </div>
          </div>

          <div id="tab-alineaciones" class="tab-content">
            <div class="section">
              <div class="section-header">
                <h2><i class="fas fa-users"></i> Alineaciones</h2>
              </div>
              <div id="alineaciones-partido" class="alineaciones-grid"></div>
            </div>
          </div>

          <div id="tab-h2h" class="tab-content">
            <div class="section">
              <div class="section-header">
                <h2><i class="fas fa-history"></i> Historial de Enfrentamientos</h2>
              </div>
              <div id="h2h-partido"></div>
            </div>
          </div>

        </div>

        <div class="col-sidebar">
          <div class="section">
            <div class="section-header">
              <h2><i class="fas fa-circle live-dot"></i> Otros Partidos</h2>
            </div>
            <div id="sidebar-vivo"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="js/data.js?v=20260401"></script>
  <script src="js/api.js?v=20260401"></script>
  <script src="js/partido.js?v=20260401"></script>
</body>
</html>
